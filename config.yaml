# erg.ai Configuration File

models_dir: "models"
data_dir: "data_processed"
sample_data_dir: "sample_data"

window_size: 30              # Rows per window (seconds if 1Hz data)
step_size: 5                 # Overlap between windows
min_file_length: 50          # Minimum rows required for processing

interval_features:
  - watts_mean
  - watts_std
  - watts_slope
  - watts_jitter
  - sr_mean
  - pace_mean

stroke_quality_features:
  - watts_mean
  - watts_std
  - watts_slope
  - watts_jitter
  - sr_mean
  - pace_mean

anomaly_features:
  - watts_mean
  - watts_std
  - watts_slope
  - watts_jitter
  - sr_mean


work_threshold_percentile: 50    # For interval labeling (median)
anomaly_contamination: 0.10      # Expected anomaly rate (10%)

# Stroke quality scoring ranges
efficiency_range: [0.8, 2.5]     # Watts per stroke rate (W/SPM)
consistency_range: [5, 50]       # Power variability (W std dev)
smoothness_range: [5, 50]        # Power jitter (W mean abs diff)

# Stroke quality weights
efficiency_weight: 0.40          # 40% of score
consistency_weight: 0.35         # 35% of score
smoothness_weight: 0.25          # 25% of score

log_level: "INFO"                # DEBUG, INFO, WARNING, ERROR, CRITICAL
log_file: "erg_ai.log"
log_format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

server:
  host: "0.0.0.0"
  port: 8000
  reload: false                  # Set true for development

max_file_size_mb: 10
allowed_extensions:
  - csv

# SQLite database (override with DATABASE_URL env var)
database_url: null

# Optional Gemini coaching (set GEMINI_API_KEY env var)
gemini_model: "gemini-3.5-flash"
gemini_api_key: null

# Type-aware scoring rubrics
session_types:
  steady_state:
    weights:
      consistency: 0.35
      pacing: 0.30
      technique: 0.25
      structure: 0.10
    pacing:
      max_drift_watts: 15
      use_segment_drift_when_split: true
    consistency:
      use_segment_std_when_split: true
    structure:
      mode: steady_state_splits
      expect_intervals: false
      allow_split_intervals: true
      min_segments: 1
      work_watts_cv_max: 0.08
      max_within_segment_drift_watts: 12
  threshold:
    weights:
      effort: 0.30
      consistency: 0.25
      pacing: 0.25
      technique: 0.20
    pacing:
      max_drift_watts: 25
    effort:
      target_ratio: 1.0
      tolerance: 0.15
    structure:
      expect_intervals: false
  intervals:
    weights:
      structure: 0.40
      consistency: 0.25
      effort: 0.20
      technique: 0.15
    structure:
      expect_intervals: true
      min_interval_pairs: 2
      work_watts_cv_max: 0.12
    pacing:
      max_drift_watts: 30
  race_test:
    weights:
      effort: 0.35
      pacing: 0.30
      technique: 0.20
      consistency: 0.15
    pacing:
      max_drift_watts: 35
    effort:
      target_ratio: 1.05
      tolerance: 0.12
  recovery:
    weights:
      technique: 0.50
      consistency: 0.30
      pacing: 0.20
    effort:
      score_mode: lenient_low_power
    pacing:
      max_drift_watts: 25